version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: productivity-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productivity
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Application (Frontend + Backend API)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productivity-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/productivity
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # Database Migration & Seed Service
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: productivity-migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/productivity
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx prisma db seed
      "

volumes:
  postgres_data:

networks:
  default:
    name: productivity-network
